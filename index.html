function toCloudPayload(session) {
  const { cloudRowId, ...clean } = session || {};
  return {
    date: clean.date || todayStr(),
    person: clean.profile || "Georgia",
    session: clean.sessionLabel || "",
    data: clean,
  };
}

function fromCloudRow(row) {
  const payload = row?.data || {};
  return {
    ...payload,
    id: payload.id || row.id,
    profile: payload.profile || row.person || "Georgia",
    date: payload.date || row.date || todayStr(),
    sessionLabel: payload.sessionLabel || row.session || "",
    feeling: Number(payload.feeling) || 0,
    note: payload.note || "",
    exercises: Array.isArray(payload.exercises) ? payload.exercises : [],
    cloudRowId: row.id,
  };
}

const REPS_ONLY = new Set([
  "pushUp", "reverseCrunch", "bandPullApart",

  "bandedClamshell", "abWheel",

function logType(exKey) {
  if (TIME_BASED.has(exKey)) return "time";
  if (REPS_ONLY.has(exKey)) return "reps";
  return "weighted";
}

const todayStr = () => new Date().toISOString().split("T")[0];
const fmtDate = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-GB", { day: "numeric", month: "short" });

function weekDaysFrom(anchorStr = todayStr()) {
  const anchor = new Date(anchorStr + "T00:00:00");
  anchor.setHours(0,0,0,0);
  const mon = new Date(anchor);
  mon.setDate(anchor.getDate() - ((anchor.getDay() + 6) % 7));
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d.toISOString().split("T")[0];
  });
}

function shiftDateStr(dateStr, days) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().split("T")[0];
}

function monthLabel(dateStr) {
  return new Date(dateStr + "T00:00:00").toLocaleDateString("en-GB", { month: "long", year: "numeric" });
}

function getMonthGrid(anchorStr = todayStr()) {
  const anchor = new Date(anchorStr + "T00:00:00");
  const first = new Date(anchor.getFullYear(), anchor.getMonth(), 1);
  const start = new Date(first);
  start.setDate(first.getDate() - ((first.getDay() + 6) % 7));
  return Array.from({ length: 35 }, (_, i) => {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    return {
      str: d.toISOString().split("T")[0],
      inMonth: d.getMonth() === anchor.getMonth(),
      day: d.getDate(),
    };
  });
}


function getStreak(sessions) {
  if (!sessions.length) return 0;
  const dates = [...new Set(sessions.map(s => s.date))].sort().reverse();
  let streak = 0; let cur = new Date(); cur.setHours(0,0,0,0);
  for (const d of dates) {
    const dd = new Date(d + "T00:00:00");
    if (Math.round((cur - dd) / 86400000) <= 1) { streak++; cur = dd; } else break;
  }
  return streak;
}

function getLastWeight(sessions, profile, exName) {
  const mine = [...sessions.filter(s => s.profile === profile)].reverse();
  for (const s of mine) {
    const ex = s.exercises?.find(e => e.name === exName);
    if (ex?.sets?.some(s => s.weight)) {
      const maxW = Math.max(...ex.sets.map(s => parseFloat(s.weight) || 0));
      return { weight: maxW, date: s.date };
    }
  }
  return null;
}

function getLastExerciseLog(sessions, profile, exName) {
  const mine = [...sessions.filter(s => s.profile === profile)].reverse();
  for (const s of mine) {
    const ex = s.exercises?.find(e => e.name === exName);
    if (!ex) continue;
    const usableSets = (ex.sets || []).filter(set => Number(set.reps) || Number(set.weight) || Number(set.time));
    if (usableSets.length) {
      return {
        date: s.date,
        sets: usableSets.map(set => ({
          reps: set.reps ? String(set.reps) : "",
          weight: set.weight ? String(set.weight) : "",
          time: set.time ? String(set.time) : "",
        }))
      };
    }
  }
  return null;
}

function getDefaultSetsForExercise(sessions, profile, exName) {
  const last = getLastExerciseLog(sessions, profile, exName);
  return last?.sets?.length ? last.sets.map(set => ({ ...set })) : [{ reps: "", weight: "", time: "" }];
}

function cloneSessionForEdit(session) {
  return {
    ...session,
    note: session.note || "",
    sessionLabel: session.sessionLabel || "",
    feeling: session.feeling || 0,
    exercises: (session.exercises || []).map(ex => ({
      ...ex,
      sets: (ex.sets || []).map(set => ({
        reps: set.reps ? String(set.reps) : "",
        weight: set.weight ? String(set.weight) : "",
        time: set.time ? String(set.time) : "",
      }))
    }))
  };
}

function LogPage({ profile, color, sessions, onSave, selectedDate, onSelectDate }) {
  const profileSessions = SESSIONS[profile];
  const [selSession, setSelSession] = useState(null);
  const [selected, setSelected]     = useState([]);
  const [step, setStep]             = useState("pick");
  const [feeling, setFeeling]       = useState(0);
  const [note, setNote]             = useState("");
  const [sets, setSets]             = useState({});
  const [warned, setWarned]         = useState(false);
  const [summary, setSummary]        = useState("");
  const [showCalendar, setShowCalendar] = useState(false);

  const toggleEx = (key) => {
    setSelected(prev => prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]);
    setSets(prev => prev[key] ? prev : { ...prev, [key]: getDefaultSetsForExercise(sessions, profile, EX[key]?.name) });
  };

  const addSet    = (k) => setSets(p => ({ ...p, [k]: [...(p[k]||[]), { reps: "", weight: "", time: "" }] }));
  const removeSet = (k, i) => setSets(p => ({ ...p, [k]: p[k].filter((_, j) => j !== i) }));
  const upSet     = (k, i, f, v) => setSets(p => ({ ...p, [k]: p[k].map((s, j) => j === i ? { ...s, [f]: v } : s) }));

  const reset = () => { setStep("pick"); setSelSession(null); setSelected([]); setSets({}); setFeeling(0); setNote(""); setWarned(false); setSummary(""); };

  const goLog = () => {
    const anyEmpty = selSession?.groups.some(g => g.exercises.filter(k => selected.includes(k)).length === 0);
    if (anyEmpty && !warned) { setWarned(true); return; }
    setStep("log");
  };

  const save = () => {
    onSave({
      id: Date.now(), date: selectedDate || todayStr(), profile, feeling, note,
      sessionLabel: selSession?.label || "",
      exercises: selected.filter(k => EX[k]).map(k => ({ name: EX[k].name, sets: sets[k] || [] })),
    });
    setSummary(getWorkoutSummary(selected, selSession?.label || "", profile));
    setStep("done");
  };

  if (step === "done") return (
    <div style={{ ...C.page, textAlign: "center", paddingTop: 60 }}>
      <div style={{ fontSize: 52, marginBottom: 14 }}>✓</div>
      <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 26, marginBottom: 6 }}>Session saved</div>
      <div style={{ color: "#aaa", fontSize: 14, marginBottom: 20 }}>Nice work, {profile}.</div>
      {summary && (
        <div style={{ background: "#fff", border: "1px solid #ebe8e3", borderRadius: 14, padding: "16px 18px", marginBottom: 28, textAlign: "left" }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: color, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>What you did</div>
          <div style={{ fontSize: 14, color: "#444", lineHeight: 1.6 }}>{summary}</div>
        </div>
      )}
      <button style={{ ...C.btn(color), padding: "12px 28px" }} onClick={reset}>Log another</button>
    </div>
  );

  if (step === "log") return (
    <div style={C.page}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
        <button onClick={() => setStep("pick")} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "#aaa", padding: 0 }}>←</button>
        <div style={C.h1}>Log your sets</div>
      </div>
      <div style={{ fontSize: 12, color: "#aaa", marginBottom: 14 }}>{selected.length} exercises · tap ← to change</div>

      <div style={C.card}>
        <span style={C.label}>How are you feeling?</span>
        <div style={{ display: "flex", gap: 7, alignItems: "center" }}>
          {[1,2,3,4,5].map(n => (
            <div key={n} onClick={() => setFeeling(n === feeling ? 0 : n)} style={{ width: 38, height: 38, borderRadius: "50%", border: `2px solid ${n <= feeling ? color : "#e0dcd6"}`, background: n <= feeling ? color : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 13, fontWeight: 600, color: n <= feeling ? "#fff" : "#ccc", transition: "all 0.15s" }}>{n}</div>
          ))}
          {feeling > 0 && <span style={{ fontSize: 12, color: "#999", marginLeft: 3 }}>{FEEL_LABELS[feeling]}</span>}
        </div>
      </div>

      {selected.filter(k => EX[k]).map(k => {
        const ex = EX[k];
        const last = getLastWeight(sessions, profile, ex.name);
        const lastLog = getLastExerciseLog(sessions, profile, ex.name);
        return (
          <div key={k} style={C.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 9 }}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{ex.name}</div>
                {last && <div style={{ fontSize: 11, color, marginTop: 2, fontWeight: 500 }}>Last: {last.weight}kg · {fmtDate(last.date)}</div>}
                {lastLog && <div style={{ fontSize: 11, color: "#999", marginTop: 3 }}>Auto-filled from {fmtDate(lastLog.date)} · change anything you want</div>}
              </div>
              <button onClick={() => { setSelected(p => p.filter(x => x !== k)); }} style={{ background: "none", border: "none", color: "#ddd", fontSize: 20, cursor: "pointer" }}>×</button>
            </div>
            {(() => {
              const lt = logType(k);
              return (<>
                <div style={{ display: "grid", gridTemplateColumns: lt === "weighted" ? "26px 1fr 1fr 22px" : "26px 1fr 22px", gap: 6, marginBottom: 4 }}>
                  <span/>
                  {lt === "time"     && <span style={{ fontSize: 10, color: "#b0aba4", fontWeight: 700 }}>SECONDS</span>}
                  {lt === "reps"     && <span style={{ fontSize: 10, color: "#b0aba4", fontWeight: 700 }}>REPS</span>}
                  {lt === "weighted" && <><span style={{ fontSize: 10, color: "#b0aba4", fontWeight: 700 }}>REPS</span><span style={{ fontSize: 10, color: "#b0aba4", fontWeight: 700 }}>KG</span></>}
                  <span/>
                </div>
                {(sets[k] || [{ reps:"", weight:"", time:"" }]).map((s, i) => (
                  <div key={i} style={{ display: "grid", gridTemplateColumns: lt === "weighted" ? "26px 1fr 1fr 22px" : "26px 1fr 22px", gap: 6, marginBottom: 6, alignItems: "center" }}>
                    <div style={{ fontSize: 11, color: "#bbb", fontWeight: 600, textAlign: "center" }}>{lt === "time" ? `H${i+1}` : `S${i+1}`}</div>
                    {lt === "time"     && <input style={C.input} type="number" inputMode="numeric" placeholder="30" value={s.time} onChange={e => upSet(k,i,"time",e.target.value)} />}
                    {lt === "reps"     && <input style={C.input} type="number" inputMode="numeric" placeholder="12" value={s.reps} onChange={e => upSet(k,i,"reps",e.target.value)} />}
                    {lt === "weighted" && <><input style={C.input} type="number" inputMode="numeric" placeholder="12" value={s.reps} onChange={e => upSet(k,i,"reps",e.target.value)} /><input style={C.input} type="number" inputMode="decimal" placeholder="20" value={s.weight} onChange={e => upSet(k,i,"weight",e.target.value)} /></>}
                    <button onClick={() => removeSet(k,i)} style={{ background:"none", border:"none", color:"#ddd", fontSize:15, cursor:"pointer" }}>×</button>
                  </div>
                ))}
              </>);
            })()}
            <button onClick={() => addSet(k)} style={{ ...C.btn(color,true), fontSize:12, padding:"6px 12px", marginTop:2 }}>+ set</button>
          </div>
        );
      })}

      <div style={C.card}>
        <span style={C.label}>Session note (optional)</span>
        <textarea style={{ ...C.input, minHeight: 64, resize: "none" }} placeholder="Felt strong today..." value={note} onChange={e => setNote(e.target.value)} />
      </div>
      <button style={{ ...C.btn(color), width: "100%", padding: "14px", fontSize: 15 }} onClick={save}>Save session</button>
    </div>
  );

  return (
    <div style={C.page}>
      <WeekStrip sessions={sessions} profile={profile} color={color} selectedDate={selectedDate} onSelectDate={onSelectDate} />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: showCalendar ? 10 : 14 }}>
        <button
          onClick={() => setShowCalendar(v => !v)}
          style={{ ...C.btn(color, true), padding: "8px 12px", fontSize: 12 }}
        >
          {showCalendar ? "Hide month" : "Show month"}
        </button>
        <div style={{ fontSize: 12, color: "#999", fontWeight: 600 }}>{monthLabel(selectedDate)}</div>
      </div>
      {showCalendar && <MonthDots sessions={sessions} profile={profile} color={color} selectedDate={selectedDate} onSelectDate={onSelectDate} />}
      <div style={C.h1}>{selectedDate === todayStr() ? "Today's workout" : `Workout for ${fmtDate(selectedDate)}`}</div>
      <div style={C.sub}>Choose your session then pick your exercises · tap a day above to switch</div>

      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {profileSessions.map(s => (
          <div key={s.id} onClick={() => { setSelSession(s); setSelected([]); setWarned(false); }}
            style={{ flex: 1, padding: "11px 10px", borderRadius: 12, border: `1.5px solid ${selSession?.id === s.id ? color : "#ebe8e3"}`, background: selSession?.id === s.id ? color + "10" : "#fff", cursor: "pointer", transition: "all 0.15s" }}>
            <div style={{ fontWeight: 600, fontSize: 12, color: selSession?.id === s.id ? color : "#444" }}>{s.label}</div>
            <div style={{ fontSize: 10, color: "#aaa", marginTop: 3, lineHeight: 1.3 }}>{s.description}</div>
          </div>
        ))}
      </div>

      {selSession && (
        <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 12, color: "#888" }}>{selSession.targetCount}</div>
            <div style={{ fontSize: 12, fontWeight: 600, color }}>{selected.length} exercise{selected.length !== 1 ? "s" : ""}</div>
          </div>

          {warned && (
            <div style={{ background: "#fff8e6", border: "1px solid #f0c040", borderRadius: 10, padding: "10px 13px", marginBottom: 12, fontSize: 13, color: "#b07c00" }}>
              ⚠ You've skipped some groups — that's okay! Tap "Log sets" again to continue anyway.
            </div>
          )}

          {selSession.groups.map((g, i) => (
            <GroupCard key={i} group={g} color={color} selected={selected} onToggle={toggleEx} sessions={sessions} profile={profile} warn={warned} />
          ))}

          <div style={{ height: 80 }} />
          <div style={{ position: "fixed", bottom: 68, left: "50%", transform: "translateX(-50%)", width: "calc(100% - 28px)", maxWidth: 412, background: color, borderRadius: 14, padding: "13px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", zIndex: 40, boxShadow: "0 6px 28px rgba(0,0,0,0.18)" }}>
            <div style={{ color: "#fff", fontSize: 13 }}><span style={{ fontWeight: 700 }}>{selected.length}</span> exercise{selected.length !== 1 ? "s" : ""} selected</div>
            <button onClick={goLog} style={{ background: "#fff", color, border: "none", borderRadius: 9, padding: "8px 16px", fontFamily: "'DM Sans',sans-serif", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>Log sets →</button>
          </div>
        </>
      )}
    </div>
  );
}

function HistoryPage({ profile, color, sessions, onUpdate, onDelete, onExport, onImportData, selectedDate, onSelectDate }) {
  const mine = sessions.filter(s => s.profile === profile).sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id);
  const filtered = selectedDate ? mine.filter(s => s.date === selectedDate) : mine;
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState(null);
  const [showCalendar, setShowCalendar] = useState(false);
  const fileRef = useRef(null);

  const openEditor = (session) => {
    setEditingId(session.id);
    setDraft(cloneSessionForEdit(session));
  };

  const closeEditor = () => {
    setEditingId(null);
    setDraft(null);
  };

  const updateDraftField = (field, value) => setDraft(prev => ({ ...prev, [field]: value }));
  const updateDraftSet = (exIdx, setIdx, field, value) => {
    setDraft(prev => ({
      ...prev,
      exercises: prev.exercises.map((ex, i) => i !== exIdx ? ex : {
        ...ex,
        sets: ex.sets.map((set, j) => j !== setIdx ? set : { ...set, [field]: value })
      })
    }));
  };
  const addDraftSet = (exIdx) => {
    setDraft(prev => ({
      ...prev,
      exercises: prev.exercises.map((ex, i) => i !== exIdx ? ex : {
        ...ex,
        sets: [...(ex.sets || []), { reps: "", weight: "", time: "" }]
      })
    }));
  };
  const removeDraftSet = (exIdx, setIdx) => {
    setDraft(prev => ({
      ...prev,
      exercises: prev.exercises.map((ex, i) => i !== exIdx ? ex : {
        ...ex,
        sets: (ex.sets || []).filter((_, j) => j !== setIdx)
      })
    }));
  };

  const saveDraft = () => {
    if (!draft) return;
    onUpdate({
      ...draft,
      exercises: (draft.exercises || []).map(ex => ({
        ...ex,
        sets: (ex.sets || []).filter(set => Number(set.reps) || Number(set.weight) || Number(set.time))
      }))
    });
    closeEditor();
  };

  const triggerImport = () => fileRef.current?.click();

  const handleImportFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      onImportData(parsed);
    } catch (err) {
      window.alert("That file couldn't be read. Please import a LIFTco backup JSON file.");
    } finally {
      e.target.value = "";
    }
  };

  return (
    <div style={C.page}>
      <WeekStrip sessions={sessions} profile={profile} color={color} selectedDate={selectedDate} onSelectDate={onSelectDate} />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: showCalendar ? 10 : 14 }}>
        <button
          onClick={() => setShowCalendar(v => !v)}
          style={{ ...C.btn(color, true), padding: "8px 12px", fontSize: 12 }}
        >
          {showCalendar ? "Hide month" : "Show month"}
        </button>
        <div style={{ fontSize: 12, color: "#999", fontWeight: 600 }}>{monthLabel(selectedDate)}</div>
      </div>
      {showCalendar && <MonthDots sessions={sessions} profile={profile} color={color} selectedDate={selectedDate} onSelectDate={onSelectDate} />}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", gap: 10 }}>
        <div>
          <div style={C.h1}>History</div>
          <div style={C.sub}>{selectedDate ? `${profile}'s sessions on ${fmtDate(selectedDate)}` : `${profile}'s sessions`}</div>
        </div>
        {selectedDate && selectedDate !== todayStr() && (
          <button style={{ ...C.btn("#aaa", true), padding: "7px 12px", fontSize: 12 }} onClick={() => onSelectDate && onSelectDate(todayStr())}>Jump to today</button>
        )}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 9, marginBottom: 12 }}>
        {[{ val: getStreak(mine), label: "day streak", suf: "🔥" }, { val: mine.length, label: "sessions" }, { val: mine.filter(s => s.feeling >= 4).length, label: "great days" }].map(({ val, label, suf }) => (
          <div key={label} style={{ ...C.card, textAlign: "center", padding: "12px 8px", marginBottom: 0 }}>
            <div style={{ fontSize: 27, fontWeight: 300, color, lineHeight: 1 }}>{val}{suf||""}</div>
            <div style={{ fontSize: 11, color: "#bbb", marginTop: 3 }}>{label}</div>
          </div>
        ))}
      </div>

      <div style={{ ...C.card, display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
        <button style={{ ...C.btn(color), padding: "10px 14px", fontSize: 12 }} onClick={onExport}>Export backup</button>
        <button style={{ ...C.btn(color, true), padding: "10px 14px", fontSize: 12 }} onClick={triggerImport}>Import backup</button>
        <input ref={fileRef} type="file" accept="application/json,.json" style={{ display: "none" }} onChange={handleImportFile} />
        <div style={{ fontSize: 11, color: "#999", alignSelf: "center" }}>Backups are browser-safe, not cloud sync.</div>
      </div>

      {filtered.length === 0 && <div style={{ textAlign: "center", color: "#ccc", fontSize: 14, marginTop: 50 }}>{selectedDate ? "No session logged for this day yet." : "No sessions yet!"}</div>}

      {filtered.map(s => {
        const isEditing = editingId === s.id && draft;
        return (
          <div key={s.id} style={C.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{fmtDate(s.date)}{s.sessionLabel ? ` · ${s.sessionLabel}` : ""}</div>
                <div style={{ fontSize: 12, color: "#aaa", marginTop: 1 }}>{s.exercises?.length || 0} exercises</div>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                {s.feeling > 0 && <div style={{ background: color+"20", color, borderRadius: 6, padding: "3px 8px", fontSize: 11, fontWeight: 600 }}>{FEEL_LABELS[s.feeling]}</div>}
                <button onClick={() => openEditor(s)} style={{ background:"none", border:"none", fontSize:14, cursor:"pointer", color:"#bbb" }}>✎</button>
                <button onClick={() => { if(window.confirm("Delete this session?")) onDelete(s.id); }} style={{ background:"none", border:"none", fontSize:17, cursor:"pointer", color:"#ddd" }}>×</button>
              </div>
            </div>

            {isEditing ? (
              <div style={{ borderTop: "1px solid #f0ece7", paddingTop: 10, marginTop: 6 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
                  <div>
                    <div style={{ ...C.label, marginBottom: 6 }}>Date</div>
                    <input style={C.input} type="date" value={draft.date} onChange={e => updateDraftField("date", e.target.value)} />
                  </div>
                  <div>
                    <div style={{ ...C.label, marginBottom: 6 }}>Session</div>
                    <input style={C.input} value={draft.sessionLabel} onChange={e => updateDraftField("sessionLabel", e.target.value)} placeholder="Upper body" />
                  </div>
                </div>

                <div style={{ marginBottom: 10 }}>
                  <div style={{ ...C.label, marginBottom: 6 }}>How it felt</div>
                  <div style={{ display: "flex", gap: 7, alignItems: "center" }}>
                    {[1,2,3,4,5].map(n => (
                      <div key={n} onClick={() => updateDraftField("feeling", n === draft.feeling ? 0 : n)} style={{ width: 34, height: 34, borderRadius: "50%", border: `2px solid ${n <= (draft.feeling || 0) ? color : "#e0dcd6"}`, background: n <= (draft.feeling || 0) ? color : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 12, fontWeight: 600, color: n <= (draft.feeling || 0) ? "#fff" : "#ccc" }}>{n}</div>
                    ))}
                    {draft.feeling > 0 && <span style={{ fontSize: 12, color: "#999", marginLeft: 3 }}>{FEEL_LABELS[draft.feeling]}</span>}
                  </div>
                </div>

                {draft.exercises?.map((ex, exIdx) => {
                  const exKey = Object.keys(EX).find(key => EX[key]?.name === ex.name);
                  const lt = exKey ? logType(exKey) : (ex.sets?.some(set => Number(set.weight)) ? "weighted" : ex.sets?.some(set => Number(set.time)) ? "time" : "reps");
                  return (
                    <div key={ex.name} style={{ border: "1px solid #f1ede8", borderRadius: 12, padding: 10, marginBottom: 9, background: "#fcfbf9" }}>
                      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>{ex.name}</div>
                      {(ex.sets || []).length === 0 && <div style={{ fontSize: 12, color: "#aaa", marginBottom: 8 }}>No sets saved yet.</div>}
                      {(ex.sets || []).map((set, setIdx) => (
                        <div key={setIdx} style={{ display: "grid", gridTemplateColumns: lt === "weighted" ? "26px 1fr 1fr 22px" : "26px 1fr 22px", gap: 6, marginBottom: 6, alignItems: "center" }}>
                          <div style={{ fontSize: 11, color: "#bbb", fontWeight: 600, textAlign: "center" }}>{lt === "time" ? `H${setIdx+1}` : `S${setIdx+1}`}</div>
                          {lt === "time"     && <input style={C.input} type="number" inputMode="numeric" value={set.time} onChange={e => updateDraftSet(exIdx, setIdx, "time", e.target.value)} placeholder="30" />}
                          {lt === "reps"     && <input style={C.input} type="number" inputMode="numeric" value={set.reps} onChange={e => updateDraftSet(exIdx, setIdx, "reps", e.target.value)} placeholder="12" />}
                          {lt === "weighted" && <><input style={C.input} type="number" inputMode="numeric" value={set.reps} onChange={e => updateDraftSet(exIdx, setIdx, "reps", e.target.value)} placeholder="12" /><input style={C.input} type="number" inputMode="decimal" value={set.weight} onChange={e => updateDraftSet(exIdx, setIdx, "weight", e.target.value)} placeholder="20" /></>}
                          <button onClick={() => removeDraftSet(exIdx, setIdx)} style={{ background:"none", border:"none", color:"#ddd", fontSize:15, cursor:"pointer" }}>×</button>
                        </div>
                      ))}
                      <button style={{ ...C.btn(color, true), fontSize: 12, padding: "6px 12px" }} onClick={() => addDraftSet(exIdx)}>+ set</button>
                    </div>
                  );
                })}

                <div style={{ marginBottom: 10 }}>
                  <div style={{ ...C.label, marginBottom: 6 }}>Session note</div>
                  <textarea style={{ ...C.input, minHeight: 56, resize: "none" }} value={draft.note} onChange={e => updateDraftField("note", e.target.value)} />
                </div>

                <div style={{ display: "flex", gap: 7 }}>
                  <button style={{ ...C.btn(color), fontSize:12, padding:"8px 13px" }} onClick={saveDraft}>Save changes</button>
                  <button style={{ ...C.btn("#aaa",true), fontSize:12, padding:"8px 13px" }} onClick={closeEditor}>Cancel</button>
                </div>
              </div>
            ) : (
              <>
                {s.exercises?.map(ex => (
                  <div key={ex.name} style={{ marginBottom: 7 }}>
                    <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 3 }}>{ex.name}</div>
                    <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                      {ex.sets?.filter(set => set.reps||set.weight||set.time).map((set,i) => (
                        <div key={i} style={{ background: "#f5f2ee", borderRadius: 6, padding: "3px 8px", fontSize: 12, color: "#666" }}>
                          S{i+1}: {[set.time&&`${set.time}s`, set.reps&&`${set.reps}r`, set.weight&&`${set.weight}kg`].filter(Boolean).join(" · ")}
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
                {s.note ? (
                  <div style={{ fontSize:12, color:"#999", borderTop:"1px solid #f5f2ee", paddingTop:7, marginTop:5, fontStyle:"italic" }}>"{s.note}"</div>
                ) : null}
              </>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// PROGRESS PAGE
// ─────────────────────────────────────────────────────────────────────────────
function ProgressPage({ profile, color, sessions }) {
  const mine = sessions.filter(s => s.profile === profile);
  const allEx = [...new Set(mine.flatMap(s => s.exercises?.map(e => e.name) || []))];
  const [selEx, setSelEx] = useState(allEx[0]||"");
  useEffect(() => { if (allEx.length && !allEx.includes(selEx)) setSelEx(allEx[0]); }, [mine.length]);

  const chartData = useMemo(() => {
    if (!selEx) return [];
    return mine.filter(s => s.exercises?.find(e => e.name===selEx)).map(s => {
      const ex = s.exercises.find(e => e.name===selEx);
      const maxW = Math.max(...(ex.sets||[]).map(s => parseFloat(s.weight)||0));
      return { date: s.date, weight: maxW };
    }).sort((a,b) => a.date.localeCompare(b.date));
  }, [selEx, sessions]);

  const valid = chartData.filter(d => d.weight>0);
  const maxW = valid.length ? Math.max(...valid.map(d=>d.weight)) : 1;
  const minW = valid.length ? Math.min(...valid.map(d=>d.weight)) : 0;
  const range = maxW-minW||1;
  const pbs = allEx.map(name => {
    const ws = mine.flatMap(s => s.exercises?.filter(e=>e.name===name).flatMap(e=>e.sets?.map(s=>parseFloat(s.weight)||0)||[])||[]).filter(w=>w>0);
    return ws.length ? { name, pb: Math.max(...ws) } : null;
  }).filter(Boolean).sort((a,b)=>b.pb-a.pb);

  return (
    <div style={C.page}>
      <div style={C.h1}>Progress</div>
      <div style={C.sub}>{profile}'s stats</div>
      {allEx.length===0 && <div style={{ textAlign:"center", color:"#ccc", fontSize:14, marginTop:50 }}>Log sessions to see progress here.</div>}
      {allEx.length>0 && (
        <>
          <div style={{ display:"flex", gap:7, overflowX:"auto", paddingBottom:10, marginBottom:12, scrollbarWidth:"none" }}>
            {allEx.map(e => <div key={e} onClick={()=>setSelEx(e)} style={{ padding:"6px 13px", borderRadius:20, border:`1.5px solid ${selEx===e?color:"#e0dcd6"}`, background:selEx===e?color:"#fff", color:selEx===e?"#fff":"#777", fontSize:12, fontWeight:selEx===e?600:400, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0 }}>{e}</div>)}
          </div>
          <div style={C.card}>
            <div style={{ fontWeight:600, fontSize:14, marginBottom:2 }}>{selEx}</div>
            <div style={{ fontSize:12, color:"#aaa", marginBottom:14 }}>Max weight per session (kg)</div>
            {valid.length<2 ? <div style={{ color:"#ccc", fontSize:13 }}>Log at least 2 sessions with this exercise to see a chart.</div> : (
              <>
                <svg width="100%" height="120" viewBox="0 0 320 120" preserveAspectRatio="none" style={{ overflow:"visible", display:"block" }}>
                  <defs><linearGradient id={`g${profile}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.12"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
                  {[0,0.5,1].map(t=><line key={t} x1="0" y1={8+(1-t)*95} x2="320" y2={8+(1-t)*95} stroke="#f0ece7" strokeWidth="1"/>)}
                  {(()=>{
                    const pts=valid.map((d,i)=>({x:10+(i/(valid.length-1))*300,y:8+(1-(d.weight-minW)/range)*95,d}));
                    const line=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
                    return(<><path d={line+` L${pts[pts.length-1].x},103 L${pts[0].x},103 Z`} fill={`url(#g${profile})`}/><path d={line} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>{pts.map((p,i)=><g key={i}><circle cx={p.x} cy={p.y} r="5" fill={color} stroke="#fff" strokeWidth="2"/><text x={p.x} y={p.y-9} textAnchor="middle" fontSize="10" fill={color} fontFamily="DM Sans,sans-serif" fontWeight="600">{p.d.weight}kg</text></g>)}</>);
                  })()}
                </svg>
                <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
                  {valid.map((d,i)=><div key={i} style={{ fontSize:10, color:"#bbb" }}>{fmtDate(d.date)}</div>)}
                </div>
              </>
            )}
          </div>
          <div style={C.card}>
            <div style={{ fontWeight:600, fontSize:14, marginBottom:10 }}>Feeling over time</div>
            <div style={{ display:"flex", gap:8, overflowX:"auto", scrollbarWidth:"none", paddingBottom:2 }}>
              {mine.filter(s=>s.feeling>0).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10).map(s=>(
                <div key={s.id} style={{ textAlign:"center", minWidth:40 }}>
                  <div style={{ width:32, height:32, borderRadius:"50%", background:color, opacity:0.15+s.feeling*0.17, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, color, fontSize:12, margin:"0 auto 3px" }}>{s.feeling}</div>
                  <div style={{ fontSize:10, color:"#bbb" }}>{fmtDate(s.date)}</div>
                </div>
              ))}
              {mine.filter(s=>s.feeling>0).length===0 && <div style={{ color:"#ccc", fontSize:13 }}>Rate sessions to see this.</div>}
            </div>
          </div>
          {pbs.length>0 && (
            <div style={C.card}>
              <div style={{ fontWeight:600, fontSize:14, marginBottom:10 }}>Personal bests 🏆</div>
              {pbs.map(({name,pb})=>(
                <div key={name} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:"1px solid #f5f2ee" }}>
                  <div style={{ fontSize:13, color:"#555" }}>{name}</div>
                  <div style={{ fontWeight:700, color, fontSize:14 }}>{pb}kg</div>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────────────────────────────────────
const NAV = [{ id:"log", label:"Workout", icon:"⊕" }, { id:"history", label:"History", icon:"◷" }, { id:"progress", label:"Progress", icon:"↗" }];

function App() {
  const [profile, setProfile] = useState(() => storage.get("lc_profile") || "Patrick");
  const [tab, setTab]         = useState("log");
  const [selectedDate, setSelectedDate] = useState(() => storage.get("lc_selected_date") || todayStr());
  const [sessions, setSessions] = useState(() => storage.get("lc_sessions") || []);
  const [cloudStatus, setCloudStatus] = useState(supabase ? "Connecting…" : "Cloud off");
  const color = COLORS[profile];

  useEffect(() => { storage.set("lc_profile", profile); }, [profile]);
  useEffect(() => { storage.set("lc_selected_date", selectedDate); }, [selectedDate]);
  useEffect(() => { storage.set("lc_sessions", sessions); }, [sessions]);

  const fetchCloudSessions = async (quiet = false) => {
    if (!supabase) return;
    if (!quiet) setCloudStatus("Syncing…");
    const { data, error } = await supabase
      .from(CLOUD_TABLE)
      .select("id, created_at, date, person, session, data")
      .order("created_at", { ascending: true });
    if (error) {
      console.error("Supabase load error", error);
      setCloudStatus("Cloud error");
      return;
    }
    const mapped = (data || []).map(fromCloudRow);
    setSessions(mapped);
    setCloudStatus("Cloud on");
  };

  useEffect(() => {
    fetchCloudSessions();
    if (!supabase) return;
    const onFocus = () => fetchCloudSessions(true);
    window.addEventListener("focus", onFocus);
    const timer = setInterval(() => fetchCloudSessions(true), 10000);
    return () => {
      window.removeEventListener("focus", onFocus);
      clearInterval(timer);
    };
  }, []);

  const saveSession = async (s) => {
    const localSession = { ...s };
    setSessions(p => [...p, localSession]);
    if (!supabase) return;
    setCloudStatus("Syncing…");
    const { error } = await supabase.from(CLOUD_TABLE).insert(toCloudPayload(localSession));
    if (error) {
      console.error("Supabase insert error", error);
      setCloudStatus("Cloud error");
      window.alert("Workout saved on this device, but cloud sync failed.");
      return;
    }
    await fetchCloudSessions(true);
  };

  const updateSession = async (u) => {
    setSessions(p => p.map(s => s.id===u.id ? { ...s, ...u } : s));
    if (!supabase) return;
    if (!u.cloudRowId) {
      await fetchCloudSessions(true);
      return;
    }
    setCloudStatus("Syncing…");
    const { error } = await supabase.from(CLOUD_TABLE).update(toCloudPayload(u)).eq("id", u.cloudRowId);
    if (error) {
      console.error("Supabase update error", error);
      setCloudStatus("Cloud error");
      window.alert("Cloud sync failed while updating that session.");
      return;
    }
    await fetchCloudSessions(true);
  };

  const deleteSession = async (id) => {
    const target = sessions.find(s => s.id === id);
    setSessions(p => p.filter(s => s.id!==id));
    if (!supabase || !target?.cloudRowId) return;
    setCloudStatus("Syncing…");
    const { error } = await supabase.from(CLOUD_TABLE).delete().eq("id", target.cloudRowId);
    if (error) {
      console.error("Supabase delete error", error);
      setCloudStatus("Cloud error");
      window.alert("Cloud sync failed while deleting that session.");
      return;
    }
    await fetchCloudSessions(true);
  };

  const exportData = () => {
    const payload = {
      app: "LIFTco",
      exportedAt: new Date().toISOString(),
      selectedDate,
      sessions: sessions.map(({ cloudRowId, ...rest }) => rest),
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `liftco-backup-${todayStr()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  };

  const replaceCloudWith = async (cleaned) => {
    if (!supabase) {
      setSessions(cleaned);
      return;
    }
    setCloudStatus("Syncing…");
    const { error: delError } = await supabase.from(CLOUD_TABLE).delete().not("id", "is", null);
    if (delError) {
      console.error("Supabase replace delete error", delError);
      setCloudStatus("Cloud error");
      window.alert("Could not clear the cloud data before import.");
      return;
    }
    if (cleaned.length) {
      const rows = cleaned.map(toCloudPayload);
      const { error: insError } = await supabase.from(CLOUD_TABLE).insert(rows);
      if (insError) {
        console.error("Supabase replace insert error", insError);
        setCloudStatus("Cloud error");
        window.alert("Could not upload the imported sessions to the cloud.");
        return;
      }
    }
    await fetchCloudSessions(true);
  };

  const importData = async (payload) => {
    const incoming = Array.isArray(payload) ? payload : payload?.sessions;
    if (!Array.isArray(incoming)) {
      window.alert("That file doesn't look like a valid LIFTco backup.");
      return;
    }
    const cleaned = incoming.map((s, idx) => ({
      id: s.id || Date.now() + idx,
      date: s.date || todayStr(),
      profile: s.profile || "Georgia",
      feeling: Number(s.feeling) || 0,
      note: s.note || "",
      sessionLabel: s.sessionLabel || "",
      exercises: (s.exercises || []).map(ex => ({
        name: ex.name || "Exercise",
        sets: (ex.sets || []).map(set => ({
          reps: set.reps ? String(set.reps) : "",
          weight: set.weight ? String(set.weight) : "",
          time: set.time ? String(set.time) : "",
        }))
      }))
    }));
    if (!window.confirm(`Import ${cleaned.length} sessions? This will replace the current data on both devices using this cloud.`)) return;
    await replaceCloudWith(cleaned);
    const importedDate = Array.isArray(payload) ? null : payload?.selectedDate;
    setSelectedDate(importedDate || todayStr());
    setTab("history");
    window.alert("Backup imported.");
  };

  return (
    <div style={C.app}>
      <div style={C.header}>
        <p style={C.logo}>LIFT<span style={{ fontStyle:"italic", color }}>co</span></p>
        <div style={C.profRow}>
          {["Patrick","Georgia"].map(p => <button key={p} style={C.profBtn(profile===p, COLORS[p])} onClick={()=>setProfile(p)}>{p}</button>)}
        </div>
        <div style={{ marginTop: 8, fontSize: 11, color: cloudStatus === "Cloud on" ? "#6d8f72" : cloudStatus === "Cloud error" ? "#c86b6b" : "#aaa" }}>
          {cloudStatus}
        </div>
      </div>
      {tab==="log"      && <LogPage      key={`log-${profile}`}  profile={profile} color={color} sessions={sessions} onSave={saveSession} selectedDate={selectedDate} onSelectDate={setSelectedDate} />}
      {tab==="history"  && <HistoryPage  key={`hist-${profile}`} profile={profile} color={color} sessions={sessions} onUpdate={updateSession} onDelete={deleteSession} onExport={exportData} onImportData={importData} selectedDate={selectedDate} onSelectDate={setSelectedDate} />}
      {tab==="progress" && <ProgressPage key={`prog-${profile}`} profile={profile} color={color} sessions={sessions} />}
      <nav style={C.nav}>
        {NAV.map(n => (
          <button key={n.id} style={C.navBtn(tab===n.id)} onClick={()=>setTab(n.id)}>
            <span style={{ fontSize:19 }}>{n.icon}</span><span>{n.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
